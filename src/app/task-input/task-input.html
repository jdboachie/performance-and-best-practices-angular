<div class="flex mb-8">
  <input [value]="newTask" (input)="setNewTask($event.target.value)" (keyup.enter)="add()"
    placeholder="What needs to be done? (Try adding a script tag!)"
    class="grow p-3 border border-gray-300 rounded-l-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
  <button (click)="add()"
    class="px-5 py-3 bg-gray-800 text-white font-semibold rounded-r-lg hover:bg-black transition duration-150">
    Add
  </button>
</div>
